    <script src="js/main.js"></script>
    <script>
        // Simple Article Loader

                    <p>Traditional insurance often involves paperwork and long wait times. Our digital-first approach means you can sign up, pay via secure cryptocurrency, and get covered in minutes. No phone calls, no fax machines, just pure efficiency.</p>
                `
            },
            2: {

                title: "Crypto Payments in Insurance",
                image: "https://images.unsplash.com/photo-1554224155-8d04cb21cd6c?w=1200&h=600&fit=crop",
                content: `
                    <p>The financial world is evolving, and insurance is keeping pace. Cryptocurrency offers a level of security, speed, and privacy that traditional banking methods simply cannot match.</p>
                    <h3>The Benefits of Paying with Bitcoin</h3>
                    <ul>

                        <li><strong>Security:</strong> Cryptographic protocols ensure your payment data is secure.</li>

                    </ul>
                    <p>We accept Bitcoin for all our premium plans, making it easier than ever for tech-savvy individuals to secure their future.</p>
                `
            },
            3: {
                category: "Business",
                title: "Protecting Your Startup",
                image: "https://images.unsplash.com/photo-1454165804606-c3d57bc86b40?w=1200&h=600&fit=crop",
                content: `
                    <p>Startups face unique risks. From cyber liabilities to property damage, a single unforeseen event can derail a promising business. Business insurance isn't just an expense; it's an investment in your company's longevity.</p>

                    <p>General Liability protects you from third-party claims. Cyber Liability is crucial in today's digital landscape, protecting your data and your customers' trust. At CanadaInsu, our Business Plan is tailored specifically for the modern enterprise.</p>
                `
            }
        };

        // Get ID from URL
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        const article = articles[id] || articles[1]; // Default to first if not found

        document.getElementById('articleCategory').textContent = article.category;
        document.getElementById('articleTitle').textContent = article.title;
        document.getElementById('articleImage').src = article.image;
        document.getElementById('articleContent').innerHTML = article.content;
